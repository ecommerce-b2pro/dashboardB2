databases:
  - name: dashboard-db
    plan: free
    databaseName: dashboard_vendas
    user: dashboard_user

services:
  - type: web
    name: dashboard-vendas
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dashboard-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: ADMIN_EMAIL
        value: admin@hubvendas.com
      - key: ADMIN_PASSWORD
        generateValue: true
