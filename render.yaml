services:
  - type: web
    name: dashboard-vendas
    runtime: node
    buildCommand: npm install && npm rebuild sqlite3 --build-from-source
    startCommand: npm start
    healthCheckPath: /
    disk:
      name: dados
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true  # Deve ter >= 32 caracteres; o Render gera automaticamente um valor seguro
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: ADMIN_EMAIL
        value: admin@hubvendas.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DATA_DIR
        value: /var/data
